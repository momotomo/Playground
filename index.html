<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Rust-only paint app with layers, guides, JSON save/load, and PNG export powered by egui + eframe." />
    <base data-trunk-public-url />
    <link data-trunk rel="rust" href="Cargo.toml" data-wasm-opt="z" />
    <link data-trunk rel="copy-file" href="assets/.nojekyll" />
    <title>Rust Paint Foundation</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #10161d;
        color: #f4f7fb;
        font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      #app-shell, #paint_canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      #loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        background:
          radial-gradient(circle at top, rgba(88, 140, 255, 0.25), transparent 40%),
          linear-gradient(180deg, #16212e 0%, #0d1319 100%);
        color: #f4f7fb;
        font-size: 1rem;
        letter-spacing: 0.03em;
      }
    </style>
  </head>
  <body>
    <div id="app-shell">
      <div id="loading">Loading the Rust Paint web app...</div>
      <canvas id="paint_canvas"></canvas>
    </div>
  </body>
</html>
