name: GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  pages-unavailable:
    if: ${{ github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain why Pages deploy is skipped
        run: |
          echo "Skipping GitHub Pages deploy because this repository is private."
          echo "GitHub Pages for this repository requires making it public or using a plan that supports private Pages sites."

  build:
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component rustfmt,clippy --target wasm32-unknown-unknown
          rustup default 1.94.0

      - name: Install Trunk
        run: cargo install --locked trunk --version 0.21.14

      - name: Compute public URL
        id: public-url
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          owner="${GITHUB_REPOSITORY_OWNER}"
          if [ "$repo" = "${owner}.github.io" ]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=/$repo/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build web app
        env:
          NO_COLOR: "false"
        run: trunk build --release --public-url "${{ steps.public-url.outputs.value }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: ${{ !github.event.repository.private }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
